<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日程壁纸生成器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- 顶部栏 -->
        <header class="header">
            <h1>📅 日程壁纸生成器</h1>
            <div class="header-actions">
                <span class="auto-update-status" id="autoUpdateStatus">🟢 自动更新</span>
                <button class="btn btn-primary" id="setWallpaperBtn">🖼️ 设为壁纸</button>
                <button class="btn btn-secondary" id="exportBtn">📥 导出</button>
            </div>
        </header>

        <div class="main-container">
            <!-- 左侧配置面板 -->
            <aside class="sidebar">
                <!-- 弥散光设置 -->
                <section class="panel">
                    <h3>🎨 弥散光</h3>
                    <div class="form-group">
                        <label class="toggle-label">
                            <input type="checkbox" id="glowEnabled" checked>
                            <span>启用弥散光效果</span>
                        </label>
                    </div>
                    <div id="gradientSettings">
                        <div class="form-group">
                            <label>光源数量</label>
                            <div class="glow-count-selector" id="glowCount">
                                <button data-count="1">1个</button>
                                <button data-count="2">2个</button>
                                <button data-count="3" class="active">3个</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>色系预设</label>
                            <select id="glowPreset">
                                <option value="blue-purple">蓝紫色（默认）</option>
                                <option value="pink-orange">粉橙色</option>
                                <option value="green-cyan">青绿色</option>
                                <option value="gold-warm">金暖色</option>
                                <option value="custom">自定义颜色</option>
                            </select>
                        </div>
                        <div class="form-group" id="customColorGroup" style="display:none">
                            <label>自定义颜色</label>
                            <div class="color-row">
                                <input type="color" id="glowColor1" value="#5078dc">
                                <input type="color" id="glowColor2" value="#a064c8">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>光源位置</label>
                            <div class="position-grid" id="glowPosition">
                                <button data-pos="top-left">↖</button>
                                <button data-pos="top-center">↑</button>
                                <button data-pos="top-right" class="active">↗</button>
                                <button data-pos="center-left">←</button>
                                <button data-pos="center">●</button>
                                <button data-pos="center-right">→</button>
                                <button data-pos="bottom-left">↙</button>
                                <button data-pos="bottom-center">↓</button>
                                <button data-pos="bottom-right">↘</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>光源强度 <span id="glowIntensityVal">100%</span></label>
                            <input type="range" id="glowIntensity" min="30" max="150" value="100">
                        </div>
                    </div>
                </section>

                <!-- 背景图片设置 -->
                <section class="panel">
                    <h3>🖼️ 背景图片</h3>
                    <div class="form-group">
                        <label class="toggle-label">
                            <input type="checkbox" id="bgImageEnabled">
                            <span>启用背景图片</span>
                        </label>
                    </div>
                    <div id="bgImageSettings" style="display:none">
                        <div class="form-group">
                            <label>上传图片</label>
                            <input type="file" id="bgUpload" accept="image/*">
                            <div class="preview-box" id="bgPreview"></div>
                        </div>
                        <div class="form-group">
                            <label>亮度 <span id="bgBrightnessVal">100%</span></label>
                            <input type="range" id="bgBrightness" min="20" max="150" value="100">
                        </div>
                        <div class="form-group">
                            <label>模糊程度 <span id="bgBlurVal">0px</span></label>
                            <input type="range" id="bgBlur" min="0" max="50" value="0">
                        </div>
                        <div class="form-group">
                            <label>暗角强度 <span id="bgVignetteVal">50%</span></label>
                            <input type="range" id="bgVignette" min="0" max="100" value="50">
                        </div>
                    </div>
                </section>

                <!-- 屏幕配置 -->
                <section class="panel">
                    <h3>🖥️ 屏幕配置</h3>
                    <div id="screenList"></div>
                    <button class="btn btn-small" id="addScreenBtn">+ 添加屏幕</button>
                </section>

                <!-- 日历范围 -->
                <section class="panel">
                    <h3>📆 日历范围</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>开始日期</label>
                            <input type="date" id="calStart">
                        </div>
                        <div class="form-group">
                            <label>结束日期</label>
                            <input type="date" id="calEnd">
                        </div>
                    </div>
                </section>

                <!-- 倒计时目标 -->
                <section class="panel">
                    <h3>🎯 倒计时目标</h3>
                    <div class="form-group">
                        <label>目标名称</label>
                        <input type="text" id="countdownName" placeholder="如：开题答辩">
                    </div>
                    <div class="form-group">
                        <label>目标日期</label>
                        <input type="date" id="countdownDate">
                    </div>
                </section>

                <!-- 今日待办 -->
                <section class="panel">
                    <h3>✅ 今日待办</h3>
                    <div id="todoList"></div>
                    <div class="add-item-row">
                        <input type="text" id="newTodoInput" placeholder="添加待办...">
                        <button class="btn btn-small" id="addTodoBtn">+</button>
                    </div>
                    <div class="assetdesk-import" style="margin-top:10px;padding-top:10px;border-top:1px solid #252535;">
                        <label style="font-size:12px;color:#666688;display:block;margin-bottom:6px;">
                            从 AssetDesk 同步今日焦点
                        </label>
                        <div style="display:flex;gap:6px;align-items:center;">
                            <input type="file" id="assetdeskFile" accept=".jsonl" style="display:none">
                            <button class="btn btn-small" id="assetdeskImportBtn" style="flex:1">
                                同步 AssetDesk
                            </button>
                            <button class="btn btn-small" id="assetdeskClearBtn" title="清理已同步的 AssetDesk 项目" style="padding:4px 8px">
                                清理
                            </button>
                        </div>
                        <div id="assetdeskStatus" style="font-size:11px;color:#666688;margin-top:5px;min-height:16px;"></div>
                    </div>
                </section>

                <!-- 时间线事件 -->
                <section class="panel">
                    <h3>📊 时间线事件</h3>
                    <div id="eventList"></div>
                    <button class="btn btn-small" id="addEventBtn">+ 添加事件</button>
                </section>

                <!-- 关键节点 -->
                <section class="panel">
                    <h3>🏁 关键节点</h3>
                    <div id="milestoneList"></div>
                    <button class="btn btn-small" id="addMilestoneBtn">+ 添加节点</button>
                </section>

                <!-- 特殊标记 -->
                <section class="panel">
                    <h3>🎓 特殊标记</h3>
                    <div id="markList"></div>
                    <button class="btn btn-small" id="addMarkBtn">+ 添加标记</button>
                </section>
            </aside>

            <!-- 右侧预览区（紧凑版） -->
            <main class="preview-area">
                <div class="preview-header">
                    <span>预览</span>
                    <div class="preview-actions">
                        <select id="previewScreen"></select>
                        <button class="btn btn-small" id="fullscreenPreviewBtn" title="放大预览">🔍</button>
                    </div>
                </div>
                <div class="canvas-container" id="canvasContainer">
                    <canvas id="previewCanvas"></canvas>
                    <div class="canvas-overlay" id="canvasOverlay">
                        <span>点击放大</span>
                    </div>
                </div>
                <div class="preview-footer">
                    <span id="lastGenerated">上次生成：--</span>
                </div>
            </main>
        </div>
    </div>

    <!-- 全屏预览弹窗 -->
    <div class="modal" id="previewModal">
        <div class="modal-content fullscreen-preview">
            <button class="close-btn" id="closePreviewBtn">&times;</button>
            <canvas id="fullPreviewCanvas"></canvas>
        </div>
    </div>

    <!-- 事件编辑弹窗 -->
    <div class="modal" id="eventModal">
        <div class="modal-content">
            <h3>编辑时间线事件</h3>
            <div class="form-group">
                <label>事件名称</label>
                <input type="text" id="eventName">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>开始日期</label>
                    <input type="date" id="eventStart">
                </div>
                <div class="form-group">
                    <label>结束日期</label>
                    <input type="date" id="eventEnd">
                </div>
            </div>
            <div class="form-group">
                <label>颜色</label>
                <input type="color" id="eventColor" value="#60a5fa">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelEventBtn">取消</button>
                <button class="btn btn-primary" id="saveEventBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 节点编辑弹窗 -->
    <div class="modal" id="milestoneModal">
        <div class="modal-content">
            <h3>编辑关键节点</h3>
            <div class="form-group">
                <label>节点名称</label>
                <input type="text" id="milestoneName">
            </div>
            <div class="form-group">
                <label>日期</label>
                <input type="date" id="milestoneDate">
            </div>
            <div class="form-group">
                <label>颜色</label>
                <input type="color" id="milestoneColor" value="#4ade80">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelMilestoneBtn">取消</button>
                <button class="btn btn-primary" id="saveMilestoneBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 标记编辑弹窗 -->
    <div class="modal" id="markModal">
        <div class="modal-content">
            <h3>编辑特殊标记</h3>
            <div class="form-group">
                <label>标记名称</label>
                <input type="text" id="markName" placeholder="如：朋友考试">
            </div>
            <div class="form-group">
                <label>日期</label>
                <input type="date" id="markDate">
            </div>
            <div class="form-group">
                <label>时间（可选）</label>
                <input type="time" id="markTime">
            </div>
            <div class="form-group">
                <label>图标</label>
                <select id="markIcon">
                    <option value="🎓">🎓 考试</option>
                    <option value="🎂">🎂 生日</option>
                    <option value="✈️">✈️ 出行</option>
                    <option value="💼">💼 会议</option>
                    <option value="🎉">🎉 庆祝</option>
                    <option value="⚠️">⚠️ 注意</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelMarkBtn">取消</button>
                <button class="btn btn-primary" id="saveMarkBtn">保存</button>
            </div>
        </div>
    </div>

    <script src="wallpaper-engine.js"></script>
    <script src="assetdesk-client.js"></script>
    <script src="app.js"></script>
</body>
</html>
